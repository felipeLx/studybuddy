<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Buddy - Test Prep</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #2d3748;
    --text-light: #718096;
    --correct: #48bb78;
    --wrong: #fc8181;
    --accent: #4A90D9;
    --radius: 12px;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header h1 { font-size: 1.8em; font-weight: 700; }
  .header p { opacity: 0.9; margin-top: 4px; font-size: 0.95em; }
  .header .stars {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .header .star {
    position: absolute;
    color: rgba(255,255,255,0.3);
    animation: twinkle 2s infinite alternate;
  }
  @keyframes twinkle { from { opacity: 0.3; } to { opacity: 1; } }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 12px 12px 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .tab {
    flex: 0 0 auto;
    padding: 10px 18px;
    border-radius: var(--radius) var(--radius) 0 0;
    background: var(--card);
    border: none;
    cursor: pointer;
    font-size: 0.95em;
    font-weight: 600;
    color: var(--text-light);
    transition: all 0.2s;
    opacity: 0.7;
    white-space: nowrap;
  }
  .tab:hover { opacity: 0.9; }
  .tab.active {
    opacity: 1;
    color: white;
    transform: translateY(-2px);
    box-shadow: var(--shadow);
  }

  /* Content */
  .content {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px 12px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
  }
  .empty-state .icon { font-size: 3em; margin-bottom: 12px; }
  .empty-state h3 { margin-bottom: 8px; }

  /* Test selector */
  .test-list { display: flex; flex-direction: column; gap: 12px; }
  .test-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    border-left: 4px solid var(--accent);
  }
  .test-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  }
  .test-card h3 { font-size: 1.1em; margin-bottom: 4px; }
  .test-card .meta { color: var(--text-light); font-size: 0.85em; }

  /* Section */
  .section {
    background: var(--card);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .section h2 {
    font-size: 1.2em;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section .instruction {
    color: var(--text-light);
    font-size: 0.9em;
    margin-bottom: 16px;
  }
  .section .hint {
    background: #ebf8ff;
    border-left: 3px solid #4299e1;
    padding: 10px 14px;
    border-radius: 0 8px 8px 0;
    margin-bottom: 16px;
    font-size: 0.88em;
    color: #2b6cb0;
  }

  /* Navigation */
  .nav-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0;
  }
  .btn {
    padding: 10px 24px;
    border-radius: 8px;
    border: none;
    font-size: 0.95em;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-outline {
    background: transparent;
    color: var(--accent);
    border: 2px solid var(--accent);
  }
  .btn-outline:hover { background: var(--accent); color: white; }
  .btn-success { background: var(--correct); color: white; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Score bar */
  .score-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--card);
    border-radius: var(--radius);
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .score-bar .progress {
    flex: 1;
    height: 8px;
    background: #e2e8f0;
    border-radius: 4px;
    overflow: hidden;
  }
  .score-bar .progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease;
    background: linear-gradient(90deg, #667eea, #764ba2);
  }
  .score-bar .score-text { font-weight: 700; font-size: 0.95em; white-space: nowrap; }

  /* Exercise types */

  /* Fill in the blank */
  .fill-question {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    margin-bottom: 14px;
    font-size: 1.05em;
    line-height: 2;
  }
  .fill-question .number { font-weight: 700; color: var(--accent); min-width: 24px; }
  .fill-input {
    border: 2px dashed #cbd5e0;
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 1em;
    width: 120px;
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .fill-input:focus { border-color: var(--accent); }
  .fill-input.correct {
    border-color: var(--correct);
    background: #f0fff4;
    color: var(--correct);
    font-weight: 700;
  }
  .fill-input.wrong {
    border-color: var(--wrong);
    background: #fff5f5;
  }
  .fill-correction {
    font-size: 0.85em;
    color: var(--correct);
    font-weight: 600;
    margin-left: 4px;
  }

  /* Multiple choice */
  .mc-question {
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid #e2e8f0;
  }
  .mc-question:last-child { border-bottom: none; }
  .mc-question .q-text { font-size: 1.05em; margin-bottom: 10px; font-weight: 500; }
  .mc-options { display: flex; flex-direction: column; gap: 6px; }
  .mc-option {
    padding: 10px 16px;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.98em;
  }
  .mc-option:hover { border-color: var(--accent); background: #ebf8ff; }
  .mc-option.selected { border-color: var(--accent); background: #ebf8ff; }
  .mc-option.correct { border-color: var(--correct); background: #f0fff4; }
  .mc-option.wrong { border-color: var(--wrong); background: #fff5f5; }
  .mc-option .letter {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85em;
    flex-shrink: 0;
  }
  .mc-option.selected .letter { background: var(--accent); color: white; }
  .mc-option.correct .letter { background: var(--correct); color: white; }
  .mc-option.wrong .letter { background: var(--wrong); color: white; }

  /* Match */
  .match-container {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 8px;
    align-items: start;
  }
  .match-left, .match-right {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .match-center { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .match-item {
    padding: 12px 16px;
    background: #edf2f7;
    border-radius: 8px;
    font-size: 0.92em;
    min-height: 50px;
    display: flex;
    align-items: center;
    transition: all 0.2s;
  }
  .match-left .match-item { cursor: pointer; border: 2px solid transparent; }
  .match-left .match-item:hover { border-color: var(--accent); }
  .match-left .match-item.selected { border-color: var(--accent); background: #ebf8ff; }
  .match-right .match-item { cursor: pointer; border: 2px solid transparent; }
  .match-right .match-item:hover { border-color: var(--accent); }
  .match-right .match-item.selected-target { border-color: var(--accent); background: #ebf8ff; }
  .match-item.matched { opacity: 0.5; pointer-events: none; }
  .match-item.correct-match { background: #f0fff4; border-color: var(--correct); opacity: 1; }
  .match-item.wrong-match { background: #fff5f5; border-color: var(--wrong); opacity: 1; }
  .match-pairs-display {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .match-pair-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: #edf2f7;
    border-radius: 8px;
    font-size: 0.9em;
  }
  .match-pair-row .arrow { color: var(--accent); font-weight: 700; }
  .match-pair-row.correct-pair { background: #f0fff4; }
  .match-pair-row.wrong-pair { background: #fff5f5; }
  .match-pair-row .remove-pair {
    margin-left: auto;
    cursor: pointer;
    color: var(--wrong);
    font-size: 1.1em;
    padding: 0 4px;
  }

  /* Unscramble */
  .unscramble-question { margin-bottom: 24px; }
  .unscramble-question .q-label {
    font-weight: 600;
    margin-bottom: 10px;
    color: var(--accent);
  }
  .word-bank {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 44px;
    padding: 12px;
    background: #edf2f7;
    border-radius: 8px;
    margin-bottom: 10px;
  }
  .word-chip {
    padding: 6px 14px;
    background: white;
    border: 2px solid #cbd5e0;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.95em;
    transition: all 0.15s;
    user-select: none;
  }
  .word-chip:hover { border-color: var(--accent); transform: scale(1.05); }
  .word-chip.used { opacity: 0.3; pointer-events: none; }
  .sentence-build {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 44px;
    padding: 12px;
    background: white;
    border: 2px dashed #cbd5e0;
    border-radius: 8px;
  }
  .sentence-build .word-chip {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }
  .sentence-build .word-chip:hover { background: #c53030; border-color: #c53030; }
  .sentence-build.correct { border-color: var(--correct); background: #f0fff4; }
  .sentence-build.wrong { border-color: var(--wrong); background: #fff5f5; }
  .unscramble-answer {
    font-size: 0.85em;
    color: var(--correct);
    font-weight: 600;
    margin-top: 6px;
    display: none;
  }

  /* Feedback animation */
  .feedback-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 4em;
    z-index: 1000;
    animation: popIn 0.6s ease forwards;
    pointer-events: none;
  }
  @keyframes popIn {
    0% { transform: translate(-50%, -50%) scale(0); }
    50% { transform: translate(-50%, -50%) scale(1.3); }
    100% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    z-index: 999;
    animation: confettiFall 3s ease-out forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Results */
  .results-card {
    text-align: center;
    padding: 40px 20px;
  }
  .results-card .big-score {
    font-size: 3em;
    font-weight: 800;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .results-card .message { font-size: 1.2em; margin: 12px 0; }
  .results-card .stars-display { font-size: 2em; margin: 8px 0; }

  /* Responsive */
  @media (max-width: 600px) {
    .header h1 { font-size: 1.4em; }
    .match-container { grid-template-columns: 1fr; gap: 12px; }
    .match-center { display: none; }
    .section { padding: 16px; }
    .tab { padding: 8px 14px; font-size: 0.85em; }
  }

  /* Back button */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--accent);
    cursor: pointer;
    font-weight: 600;
    margin-bottom: 16px;
    font-size: 0.95em;
  }
  .back-btn:hover { text-decoration: underline; }

  /* Loading */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-light);
  }
  .loading .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #e2e8f0;
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="stars" id="stars"></div>
  <h1>📖 Study Buddy</h1>
  <p>Let's get ready for the test!</p>
</div>

<div class="tabs" id="tabs"></div>

<div class="content" id="content">
  <div class="loading">
    <div class="spinner"></div>
    <p>Loading exercises...</p>
  </div>
</div>

<script>
const SUBJECTS = ['english', 'math', 'history', 'portuguese', 'science', 'french'];
const subjectData = {};
let currentSubject = null;
let currentTest = null;
let currentSectionIdx = 0;
let sectionAnswers = {};
let totalCorrect = 0;
let totalQuestions = 0;

// Match state
let matchSelected = null;
let matchPairs = [];

// Init
async function init() {
  createStars();
  await loadAllSubjects();
  renderTabs();
  selectSubject(SUBJECTS[0]);
}

function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 15; i++) {
    const star = document.createElement('span');
    star.className = 'star';
    star.textContent = ['⭐','✨','🌟'][Math.floor(Math.random()*3)];
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.fontSize = (0.6 + Math.random() * 0.8) + 'em';
    star.style.animationDelay = Math.random() * 2 + 's';
    container.appendChild(star);
  }
}

async function loadAllSubjects() {
  const promises = SUBJECTS.map(async (s) => {
    try {
      const resp = await fetch(`exercises/${s}.json`);
      subjectData[s] = await resp.json();
    } catch (e) {
      subjectData[s] = { subject: s, icon: '📝', color: '#718096', tests: [] };
    }
  });
  await Promise.all(promises);
}

function renderTabs() {
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = '';
  SUBJECTS.forEach(s => {
    const data = subjectData[s];
    const btn = document.createElement('button');
    btn.className = 'tab';
    btn.textContent = `${data.icon} ${data.subject}`;
    btn.onclick = () => selectSubject(s);
    btn.dataset.subject = s;
    tabsEl.appendChild(btn);
  });
}

function selectSubject(s) {
  currentSubject = s;
  currentTest = null;
  currentSectionIdx = 0;
  totalCorrect = 0;
  totalQuestions = 0;

  document.querySelectorAll('.tab').forEach(t => {
    const isActive = t.dataset.subject === s;
    t.classList.toggle('active', isActive);
    if (isActive) {
      t.style.background = subjectData[s].color;
    } else {
      t.style.background = '';
    }
  });
  document.documentElement.style.setProperty('--accent', subjectData[s].color);
  renderTestList();
}

function renderTestList() {
  const data = subjectData[currentSubject];
  const el = document.getElementById('content');

  if (!data.tests || data.tests.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="icon">${data.icon}</div>
        <h3>No exercises yet!</h3>
        <p>Add exercises to <strong>exercises/${currentSubject}.json</strong></p>
      </div>`;
    return;
  }

  let html = '<div class="test-list">';
  data.tests.forEach((test, i) => {
    const sectionCount = test.sections ? test.sections.length : 0;
    html += `
      <div class="test-card" onclick="startTest(${i})">
        <h3>${test.title}</h3>
        <div class="meta">${sectionCount} section${sectionCount !== 1 ? 's' : ''}</div>
      </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

function startTest(idx) {
  const data = subjectData[currentSubject];
  currentTest = data.tests[idx];
  currentSectionIdx = 0;
  totalCorrect = 0;
  totalQuestions = 0;
  sectionAnswers = {};
  renderSection();
}

function renderSection() {
  const el = document.getElementById('content');
  if (currentSectionIdx >= currentTest.sections.length) {
    renderResults();
    return;
  }

  const section = currentTest.sections[currentSectionIdx];
  const progress = ((currentSectionIdx) / currentTest.sections.length * 100);

  let html = `
    <div class="back-btn" onclick="goBack()">← Back to tests</div>
    <div class="score-bar">
      <span class="score-text">Part ${currentSectionIdx + 1}/${currentTest.sections.length}</span>
      <div class="progress"><div class="progress-fill" style="width:${progress}%"></div></div>
      <span class="score-text">⭐ ${totalCorrect}</span>
    </div>
    <div class="section">
      <h2>${getSectionIcon(section.type)} ${section.title}</h2>
      <p class="instruction">${section.instruction}</p>
      ${section.hint ? `<div class="hint">💡 ${section.hint}</div>` : ''}
      <div id="exercise-area"></div>
    </div>
    <div class="nav-bar">
      <div></div>
      <button class="btn btn-primary" id="check-btn" onclick="checkSection()">Check Answers ✓</button>
    </div>`;

  el.innerHTML = html;

  const area = document.getElementById('exercise-area');
  switch (section.type) {
    case 'fill': renderFill(area, section); break;
    case 'multiple_choice': renderMC(area, section); break;
    case 'match': renderMatch(area, section); break;
    case 'unscramble': renderUnscramble(area, section); break;
    default: area.innerHTML = '<p>Unknown exercise type.</p>';
  }
}

function getSectionIcon(type) {
  const icons = { fill: '✏️', multiple_choice: '🔘', match: '🔗', unscramble: '🧩' };
  return icons[type] || '📝';
}

// Fill in the blank
function renderFill(area, section) {
  sectionAnswers = {};
  let html = '';
  section.questions.forEach((q, i) => {
    html += `
      <div class="fill-question">
        <span class="number">${i+1}.</span>
        <span>${q.before}</span>
        <input type="text" class="fill-input" id="fill-${i}" placeholder="?"
               oninput="sectionAnswers[${i}] = this.value">
        <span>${q.after}</span>
        <span class="fill-correction" id="fill-corr-${i}"></span>
      </div>`;
  });
  area.innerHTML = html;
}

// Multiple choice
function renderMC(area, section) {
  sectionAnswers = {};
  let html = '';
  section.questions.forEach((q, qi) => {
    html += `<div class="mc-question" id="mc-q-${qi}">
      <div class="q-text">${qi+1}. ${q.text}</div>
      <div class="mc-options">`;
    q.options.forEach((opt, oi) => {
      const letter = String.fromCharCode(97 + oi);
      html += `<div class="mc-option" id="mc-${qi}-${oi}" onclick="selectMC(${qi}, ${oi})">
        <span class="letter">${letter}</span>
        <span>${opt}</span>
      </div>`;
    });
    html += '</div></div>';
  });
  area.innerHTML = html;
}

function selectMC(qi, oi) {
  const section = currentTest.sections[currentSectionIdx];
  const options = section.questions[qi].options;
  options.forEach((_, o) => {
    document.getElementById(`mc-${qi}-${o}`).classList.remove('selected');
  });
  document.getElementById(`mc-${qi}-${oi}`).classList.add('selected');
  sectionAnswers[qi] = oi;
}

// Match
function renderMatch(area, section) {
  matchPairs = [];
  matchSelected = null;
  const shuffledRight = [...section.pairs].sort(() => Math.random() - 0.5);
  sectionAnswers._shuffledRight = shuffledRight;
  sectionAnswers._pairs = [];

  let html = `<div class="match-container">
    <div class="match-left">`;
  section.pairs.forEach((p, i) => {
    html += `<div class="match-item" id="match-l-${i}" onclick="selectMatchLeft(${i})">${p.left}</div>`;
  });
  html += '</div><div class="match-center">';
  section.pairs.forEach(() => { html += '<div style="height:50px;display:flex;align-items:center">→</div>'; });
  html += '</div><div class="match-right">';
  shuffledRight.forEach((p, i) => {
    html += `<div class="match-item" id="match-r-${i}" onclick="selectMatchRight(${i})">${p.right}</div>`;
  });
  html += '</div></div>';
  html += '<div class="match-pairs-display" id="match-pairs-display"></div>';
  area.innerHTML = html;
}

function selectMatchLeft(i) {
  if (sectionAnswers._pairs.some(p => p.left === i)) return;
  document.querySelectorAll('.match-left .match-item').forEach(el => el.classList.remove('selected'));
  document.getElementById(`match-l-${i}`).classList.add('selected');
  matchSelected = { side: 'left', index: i };
}

function selectMatchRight(i) {
  if (sectionAnswers._pairs.some(p => p.right === i)) return;
  if (!matchSelected || matchSelected.side !== 'left') {
    document.querySelectorAll('.match-right .match-item').forEach(el => el.classList.remove('selected-target'));
    document.getElementById(`match-r-${i}`).classList.add('selected-target');
    matchSelected = { side: 'right', index: i };
    return;
  }
  const leftIdx = matchSelected.index;
  sectionAnswers._pairs.push({ left: leftIdx, right: i });
  document.getElementById(`match-l-${leftIdx}`).classList.add('matched');
  document.getElementById(`match-r-${i}`).classList.add('matched');
  document.querySelectorAll('.match-left .match-item').forEach(el => el.classList.remove('selected'));
  matchSelected = null;
  renderMatchPairs();
}

function renderMatchPairs() {
  const section = currentTest.sections[currentSectionIdx];
  const display = document.getElementById('match-pairs-display');
  let html = '';
  sectionAnswers._pairs.forEach((p, i) => {
    const leftText = section.pairs[p.left].left;
    const rightText = sectionAnswers._shuffledRight[p.right].right;
    html += `<div class="match-pair-row">
      <span>${leftText}</span>
      <span class="arrow">→</span>
      <span>${rightText}</span>
      <span class="remove-pair" onclick="removeMatchPair(${i})">✕</span>
    </div>`;
  });
  display.innerHTML = html;
}

function removeMatchPair(i) {
  const pair = sectionAnswers._pairs[i];
  document.getElementById(`match-l-${pair.left}`).classList.remove('matched');
  document.getElementById(`match-r-${pair.right}`).classList.remove('matched');
  sectionAnswers._pairs.splice(i, 1);
  renderMatchPairs();
}

// Unscramble
function renderUnscramble(area, section) {
  sectionAnswers = {};
  let html = '';
  section.questions.forEach((q, qi) => {
    const shuffled = [...q.words].sort(() => Math.random() - 0.5);
    sectionAnswers[qi] = { words: shuffled, built: [] };

    html += `<div class="unscramble-question" id="unscramble-${qi}">
      <div class="q-label">${qi+1}.</div>
      <div class="word-bank" id="bank-${qi}">
        ${shuffled.map((w, wi) => `<span class="word-chip" id="word-${qi}-${wi}" onclick="pickWord(${qi},${wi})">${w}</span>`).join('')}
      </div>
      <div class="sentence-build" id="build-${qi}"></div>
      <div class="unscramble-answer" id="unscrAnswer-${qi}">✓ ${q.answer}</div>
    </div>`;
  });
  area.innerHTML = html;
}

function pickWord(qi, wi) {
  const state = sectionAnswers[qi];
  if (state.built.includes(wi)) return;
  state.built.push(wi);
  document.getElementById(`word-${qi}-${wi}`).classList.add('used');
  renderBuiltSentence(qi);
}

function unpickWord(qi, buildIdx) {
  const state = sectionAnswers[qi];
  const wi = state.built[buildIdx];
  state.built.splice(buildIdx, 1);
  document.getElementById(`word-${qi}-${wi}`).classList.remove('used');
  renderBuiltSentence(qi);
}

function renderBuiltSentence(qi) {
  const state = sectionAnswers[qi];
  const buildEl = document.getElementById(`build-${qi}`);
  buildEl.innerHTML = state.built.map((wi, bi) =>
    `<span class="word-chip" onclick="unpickWord(${qi},${bi})">${state.words[wi]}</span>`
  ).join('');
}

// Check answers
function checkSection() {
  const section = currentTest.sections[currentSectionIdx];
  let correct = 0;
  let total = 0;

  switch (section.type) {
    case 'fill':
      section.questions.forEach((q, i) => {
        total++;
        const input = document.getElementById(`fill-${i}`);
        const corr = document.getElementById(`fill-corr-${i}`);
        const val = (input.value || '').trim().toLowerCase();
        const accepted = (q.accept || [q.answer]).map(a => a.toLowerCase());
        if (accepted.includes(val)) {
          correct++;
          input.classList.add('correct');
          input.disabled = true;
        } else {
          input.classList.add('wrong');
          input.disabled = true;
          corr.textContent = `→ ${q.answer}`;
          corr.style.display = 'inline';
        }
      });
      break;

    case 'multiple_choice':
      section.questions.forEach((q, qi) => {
        total++;
        const selected = sectionAnswers[qi];
        if (selected === q.answer) {
          correct++;
          document.getElementById(`mc-${qi}-${selected}`).classList.add('correct');
        } else {
          if (selected !== undefined) {
            document.getElementById(`mc-${qi}-${selected}`).classList.add('wrong');
          }
          document.getElementById(`mc-${qi}-${q.answer}`).classList.add('correct');
        }
        q.options.forEach((_, oi) => {
          document.getElementById(`mc-${qi}-${oi}`).style.pointerEvents = 'none';
        });
      });
      break;

    case 'match':
      const pairs = sectionAnswers._pairs || [];
      const shuffledRight = sectionAnswers._shuffledRight;
      section.pairs.forEach((p, i) => {
        total++;
        const userPair = pairs.find(up => up.left === i);
        if (userPair) {
          const userRight = shuffledRight[userPair.right].right;
          if (userRight === p.right) {
            correct++;
            document.getElementById(`match-l-${i}`).classList.replace('matched', 'correct-match');
            document.getElementById(`match-r-${userPair.right}`).classList.replace('matched', 'correct-match');
          } else {
            document.getElementById(`match-l-${i}`).classList.replace('matched', 'wrong-match');
            document.getElementById(`match-r-${userPair.right}`).classList.replace('matched', 'wrong-match');
          }
        }
      });
      const display = document.getElementById('match-pairs-display');
      if (display) {
        const rows = display.querySelectorAll('.match-pair-row');
        rows.forEach((row, i) => {
          const pair = pairs[i];
          if (pair) {
            const leftText = section.pairs[pair.left].right;
            const rightText = shuffledRight[pair.right].right;
            row.classList.add(leftText === rightText ? 'correct-pair' : 'wrong-pair');
            row.querySelector('.remove-pair').style.display = 'none';
          }
        });
      }
      break;

    case 'unscramble':
      section.questions.forEach((q, qi) => {
        total++;
        const state = sectionAnswers[qi];
        const built = state.built.map(wi => state.words[wi]).join(' ');
        const buildEl = document.getElementById(`build-${qi}`);
        const answerEl = document.getElementById(`unscrAnswer-${qi}`);
        if (built === q.answer) {
          correct++;
          buildEl.classList.add('correct');
        } else {
          buildEl.classList.add('wrong');
          answerEl.style.display = 'block';
        }
      });
      break;
  }

  totalCorrect += correct;
  totalQuestions += total;

  showFeedback(correct, total);

  const btn = document.getElementById('check-btn');
  btn.textContent = 'Next →';
  btn.onclick = () => { currentSectionIdx++; renderSection(); };
}

function showFeedback(correct, total) {
  const ratio = correct / total;
  let emoji;
  if (ratio === 1) emoji = '🎉';
  else if (ratio >= 0.7) emoji = '👏';
  else if (ratio >= 0.4) emoji = '💪';
  else emoji = '🤔';

  const popup = document.createElement('div');
  popup.className = 'feedback-popup';
  popup.textContent = emoji;
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 700);

  if (ratio === 1) launchConfetti();
}

function launchConfetti() {
  const colors = ['#667eea','#764ba2','#48bb78','#f6ad55','#fc8181','#4299e1'];
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 0.5 + 's';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 3500);
  }
}

function renderResults() {
  const el = document.getElementById('content');
  const pct = totalQuestions > 0 ? Math.round(totalCorrect / totalQuestions * 100) : 0;
  let msg, stars;
  if (pct === 100) { msg = 'Perfect! You\'re amazing! 🏆'; stars = '⭐⭐⭐⭐⭐'; }
  else if (pct >= 80) { msg = 'Great job! Almost perfect!'; stars = '⭐⭐⭐⭐'; }
  else if (pct >= 60) { msg = 'Good work! Keep practicing!'; stars = '⭐⭐⭐'; }
  else if (pct >= 40) { msg = 'Nice try! Let\'s review and try again!'; stars = '⭐⭐'; }
  else { msg = 'Don\'t worry! Practice makes perfect!'; stars = '⭐'; }

  el.innerHTML = `
    <div class="section results-card">
      <div class="big-score">${pct}%</div>
      <div class="stars-display">${stars}</div>
      <div class="message">${msg}</div>
      <p style="color:var(--text-light);margin-bottom:20px">${totalCorrect} out of ${totalQuestions} correct</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="startTest(${subjectData[currentSubject].tests.indexOf(currentTest)})">Try Again 🔄</button>
        <button class="btn btn-outline" onclick="renderTestList()">Back to Tests</button>
      </div>
    </div>`;

  if (pct >= 80) launchConfetti();
}

function goBack() {
  currentTest = null;
  renderTestList();
}

// Start
init();
</script>
